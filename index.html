<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冰岛 + 芬兰 慢活之旅 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="header-inner">
    <button class="back-btn" id="backBtn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      返回
    </button>
    <div id="headerContent">
      <div class="header-title">🧊 冰岛 + 芬兰 慢活之旅</div>
      <div class="header-sub">October 3 – 11, 2026</div>
    </div>
  </div>
</header>

<!-- ══ PAGE: 行程 ══ -->
<!-- 此頁籤的內容（總覽橫幅 + 每日卡片）由 data/trip-days.js 動態產生，見 js/app.js 的 renderOverview() -->
<div class="page active" id="page-itinerary">
  <div class="view active" id="view-overview">
    <div class="page-inner" id="overviewContent"></div>
  </div>

  <!-- 每日景点列表 -->
  <div class="view" id="view-day">
    <div class="page-inner">
      <div class="day-hero" id="dayHero"></div>
      <p class="spot-list-label">今日景点 &amp; 行程</p>
      <div id="spotList"></div>
    </div>
  </div>

  <!-- 景点详情 -->
  <div class="view" id="view-spot">
    <div class="page-inner">
      <div id="spotDetail"></div>
    </div>
  </div>
</div>

<!-- 以下三個頁籤的完整內容，分別放在 data/travel-content.js、data/budget-content.js、data/other-content.js
     裡（各自是一段 HTML 模板字串），由 js/app.js 在載入時把內容填入這三個掛載點。
     要調整「旅遊 / 費用 / 其他」頁籤的文字或項目，直接編輯對應的 data/*.js 檔案即可，不需要動這裡。 -->
<div id="mount-travel"></div>
<div id="mount-budget"></div>
<div id="mount-other"></div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <button class="nav-tab active" id="tab-itinerary" onclick="switchTab('itinerary')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    行程<div class="nav-dot"></div>
  </button>
  <button class="nav-tab" id="tab-travel" onclick="switchTab('travel')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
    旅游<div class="nav-dot"></div>
  </button>
  <button class="nav-tab" id="tab-budget" onclick="switchTab('budget')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="12" cy="15" r="1.5" fill="currentColor"/></svg>
    费用<div class="nav-dot"></div>
  </button>
  <button class="nav-tab" id="tab-other" onclick="switchTab('other')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    其他<div class="nav-dot"></div>
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- 資料檔案（必須排在 js/app.js 之前載入） -->
<script src="data/trip-days.js"></script>
<script src="data/trip-details.js"></script>
<script src="data/travel-content.js"></script>
<script src="data/budget-content.js"></script>
<script src="data/other-content.js"></script>
<!-- 主程式邏輯 -->
<script src="js/app.js"></script>
</body>
</html>
