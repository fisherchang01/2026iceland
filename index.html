<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行行程</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══ HEADER ══ -->
<!-- v6.1：頂端標題列簡化為單行文字（不再顯示日期副標、右側插畫），
     且不再需要「返回」按鈕——切換日期已改由下方常駐選單列的「行程概覽」負責 -->
<header id="siteHeader">
  <div class="header-inner">
    <div id="headerContent">
      <div class="header-title" id="headerTitle"></div>
    </div>
  </div>
</header>

<!-- ══ PAGE: 行程 ══ -->
<!-- 此頁籤的內容（總覽橫幅 + 每日卡片）由資料模型動態產生，見 js/render-overview.js -->
<div class="page active" id="page-itinerary">

  <!-- 頂端地圖 + 日期選單列（v6）：固定顯示在行程總覽與每日行程之上，不隨頁面切換而消失。
       地圖：沿用原本 data/trip-details.js 裡每一天的 routeMapImg 欄位（使用者自行把地圖圖片放到
       images/routes/ 資料夾底下、檔名填進該天的 routeMapImg），選到哪一天就換哪一天的圖，
       跟景點照片共用同一套 lightbox 放大機制。行程總覽狀態、以及沒有設定 routeMapImg 的天數，
       都會顯示預留版位，維持版面尺寸一致，之後要補圖只需要在 trip-details.js 補上檔名即可。
       日期選單列：「行程概覽」固定不動，右側每日按鈕可左右滑動。 -->
  <div class="itin-top">
    <div class="page-inner itin-top-inner">
      <div class="itin-map" id="itinMap">
        <img id="itinMapImg" src="" alt="今日路线地图" decoding="async" style="display:none" onclick="openItinMapLightbox()" />
        <div class="itin-map-placeholder" id="itinMapPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>地图准备中</span>
        </div>
      </div>
      <div class="itin-day-selector">
        <button class="itin-pill itin-pill-fixed active" id="itinPillOverview" onclick="selectItin('overview')">全部行程</button>
        <div class="itin-pill-scroll" id="itinPillScroll"></div>
      </div>
      <div class="itin-day-heading" id="itinDayHeading" style="display:none"></div>
    </div>
  </div>

  <div class="view active" id="view-overview">
    <div class="page-inner" id="overviewContent"></div>
  </div>

  <!-- 每日景点列表：日期標題已經移到上面常駐的 .itin-top 裡（跟著地圖/選單列一起固定），
       這裡只剩會捲動的景點列表本身。 -->
  <div class="view" id="view-day">
    <div class="page-inner">
      <p class="spot-list-label">今日景点 &amp; 行程</p>
      <div id="spotList"></div>
    </div>
  </div>
</div>

<!-- 景點詳情：改成由下往上彈出的 sheet，蓋在當天景點列表上方，不再是整頁跳轉。
     v8：標題框（spotSheetHero）獨立在捲動區外面，固定不動；其餘內容（標籤/介紹/照片等）在下方捲動。 -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSpotSheet()"></div>
<div class="spot-sheet" id="spotSheet">
  <div class="spot-sheet-handle-wrap" onclick="closeSpotSheet()">
    <div class="spot-sheet-handle"></div>
  </div>
  <button class="spot-sheet-close" onclick="closeSpotSheet()" aria-label="关闭">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <div class="spot-sheet-hero" id="spotSheetHero"></div>
  <div class="spot-sheet-scroll">
    <div id="spotDetail"></div>
  </div>
</div>

<!-- 圖片放大燈箱：點擊景點照片（單張或網格縮圖）皆可放大檢視；有多張照片時可左右切換 -->
<div class="img-lightbox" id="imgLightbox" onclick="closeLightbox(event)">
  <button class="img-lightbox-close" onclick="closeLightbox(event)" aria-label="关闭">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <button class="img-lightbox-nav img-lightbox-prev" id="lightboxPrev" onclick="lightboxPrev(event)" aria-label="上一张">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <img id="lightboxImg" src="" alt="" decoding="async" onclick="event.stopPropagation()" />
  <button class="img-lightbox-nav img-lightbox-next" id="lightboxNext" onclick="lightboxNext(event)" aria-label="下一张">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <div class="img-lightbox-counter" id="lightboxCounter"></div>
</div>

<!-- 以下三個頁籤的完整內容，分別放在 data/travel-content.js、data/budget-content.js、data/other-content.js
     裡（各自是一段 HTML 模板字串），由 js/render-overview.js 把內容填入這三個掛載點。
     要調整「體驗 / 工具 / 費用」頁籤的文字或項目，直接編輯對應的 data/*.js 檔案即可，不需要動這裡。 -->
<div id="mount-travel"></div>
<div id="mount-budget"></div>
<div id="mount-other"></div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <button class="nav-tab active" id="tab-itinerary" onclick="switchTab('itinerary')">
    <span class="nav-tab-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="nav-tab-label">行程</span>
    </span>
  </button>
  <button class="nav-tab" id="tab-travel" onclick="switchTab('travel')">
    <span class="nav-tab-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      <span class="nav-tab-label">體驗</span>
    </span>
  </button>
  <button class="nav-tab" id="tab-other" onclick="switchTab('other')">
    <span class="nav-tab-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="4" fill="currentColor"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      <span class="nav-tab-label">工具</span>
    </span>
  </button>
  <button class="nav-tab" id="tab-budget" onclick="switchTab('budget')">
    <span class="nav-tab-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/><circle cx="12" cy="15" r="1.8" fill="currentColor"/></svg>
      <span class="nav-tab-label">費用</span>
    </span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- 資料檔案（必須排在下面的程式邏輯之前載入）。建立新旅程只修改 data/ 與 images/。 -->
<script src="data/trip-config.js"></script>
<script src="data/budget-config.js"></script>
<script src="data/firebase-settings.js"></script>
<script src="data/catalog-config.js"></script>
<script src="data/trip-days.js"></script>
<script src="data/trip-details.js"></script>
<script src="data/image-manifest.js"></script>
<script src="data/travel-content.js"></script>
<script src="data/budget-content.js"></script>
<script src="data/other-content.js"></script>
<script src="data/docs-content.js"></script>
<script src="data/trip-schema.js"></script>

<!-- 程式邏輯：依功能拆成幾個檔案，方便日後找東西改東西 -->
<script src="js/nav.js"></script>              <!-- 導覽／頁籤切換 -->
<script src="js/catalog-nav.js"></script>      <!-- 體驗／工具總覽、分類與詳情 -->
<script src="js/spot-icons.js"></script>       <!-- 景點 SVG 插圖 -->
<script src="js/render-itinerary.js"></script> <!-- 每日行程／景點詳情畫面 -->
<script src="js/budget.js"></script>           <!-- 費用記帳 -->
<script src="js/render-overview.js"></script>  <!-- 總覽頁與其他頁籤掛載 -->
<script src="js/render-docs.js"></script>      <!-- 旅行文件清單渲染 -->
<script src="js/init.js"></script>             <!-- 啟動流程，務必放最後 -->

<!-- 費用雲端同步（Firebase）：一定要放在最後面，且獨立於上面的載入順序，
     避免跟一般腳本的執行順序互相依賴，在部分手機瀏覽器上更穩定 -->
<script src="js/firebase-config.js" type="module"></script>
</body>
</html>
